name: Auto-approve PRs

# Auto-approves PRs after Claude Code Review has run.
# Runs as github-actions[bot] — GitHub forbids self-approval, so this only
# approves PRs whose author is NOT the bot itself (i.e. user-authored PRs).
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_run:
    workflows: ["Claude Code Review"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  approve:
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: |
            Auto-approved after Claude Code Review.
